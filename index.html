<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BITVIS 人口死亡率可视化</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>全球人口死亡率交互式可视化</h1>
    <p class="subtitle">BITVIS 作业2 & 期末大作业</p>

    <div class="control-panel">
      <button id="show-asia">亚洲国家</button>
      <button id="show-europe">欧洲国家</button>
      <button id="show-all">全部国家（2021年）</button>
    </div>

    <div id="visualization"></div>

    <div class="document">
      <h2>说明文档</h2>
      <p><strong>1. 可视化目标：</strong>展示全球各国人口死亡率分布，支持按地区筛选，辅助观察区域差异。</p>
      <p><strong>2. 视觉编码：</strong>X轴为国家名称，Y轴为每1000人的死亡率，颜色区分地区，高度映射数值大小。</p>
      <p><strong>3. 交互设计：</strong>鼠标悬浮显示具体国家+死亡率数值，按钮筛选不同地区数据。</p>
      <p><strong>4. 数据来源：</strong>世界银行人口死亡率数据集。</p>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
